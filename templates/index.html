<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Safari Fotos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header><div class="brand"><span>SAFARI</span><small>LOCALIZADOR DE FOTOS</small></div><div class="pill">Safari → Fabricante</div></header>
  <main>
    <section class="hero">
      <p class="eyebrow">CATÁLOGO INTELIGENTE</p><h1>Fotos certas para cada produto.</h1>
      <p>Envie a planilha. A gente procura primeiro no catálogo Safari e consulta o fabricante quando necessário.</p>
      <label class="drop" id="drop"><input id="file" type="file" accept=".xlsx,.xlsm"><b>Arraste sua planilha aqui</b><span>ou clique para selecionar um arquivo Excel</span></label>
    </section>
    <section id="workspace" class="workspace hidden">
      <div class="toolbar"><div><b id="filename"></b><span id="summary"></span></div><div class="actions"><button id="search" class="primary">Buscar fotos</button><button id="xlsx">Baixar Excel</button><button id="zip">Baixar ZIP</button></div></div>
      <div class="progress"><i id="bar"></i></div>
      <div class="filters"><input id="filter" placeholder="Filtrar por código ou descrição"><select id="status"><option value="">Todos os status</option><option>Encontrado</option><option>Revisar</option><option>Não encontrado</option></select></div>
      <div class="table-wrap"><table><thead><tr><th>Foto</th><th>Código / produto</th><th>Origem</th><th>Status</th><th>Ajustar</th></tr></thead><tbody id="rows"></tbody></table></div>
    </section>
  </main>
  <template id="row-template"><tr><td><div class="photo">—</div></td><td><b class="code"></b><span class="description"></span></td><td><a class="source" target="_blank">—</a></td><td><span class="badge">Não encontrado</span></td><td><input class="url" placeholder="Cole outra URL de imagem"></td></tr></template>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body></html>
